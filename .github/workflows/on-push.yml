name: Push

on:
  # Only build on main branch when pushed (when PR is merged)
  push:
    branches:
      - main
  # Only build in PR on creation/update
  pull_request:

env:
  APP_VERSION: ${{ github.sha }}
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      BRANCH_NAME: ${{ env.BRANCH_NAME }}
      ENCODED_BRANCH_NAME: ${{ steps.branchname.outputs.ENCODED_BRANCH_NAME }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is needed to diff against the PR base / previous push.
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml
      - name: Install dependencies
        run: uv sync --frozen
      - name: Determine changed Python files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            git fetch --no-tags --depth=50 origin "$BASE_REF"
            BASE_SHA=$(git merge-base "origin/$BASE_REF" HEAD)
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          CHANGED=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA"...HEAD \
            -- 'pymammotion/**/*.py' ':(exclude)pymammotion/proto/**' | tr '\n' ' ')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ -n "$CHANGED" ]; then
            echo "Changed Python files: $CHANGED"
          else
            echo "No Python files changed under pymammotion/."
          fi
      - name: Python Ruff Lint and Format (changed files only)
        if: steps.changed.outputs.files != ''
        run: |
          uv run ruff check ${{ steps.changed.outputs.files }}
          uv run ruff format --check ${{ steps.changed.outputs.files }}
      - name: Run tests
        run: uv run pytest tests/ -m "not live"

  proto-codegen:
    # Verify that the checked-in pymammotion/proto/*.py files still match what
    # would be generated from the *.proto sources.  Catches drift when someone
    # edits a .proto without re-running codegen, which would silently break
    # sagas via renamed protobuf oneof fields.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml
      - name: Install dependencies
        run: uv sync --frozen
      - name: Regenerate proto code
        run: uv run protoc -I=. --python_out=. --python_betterproto2_out=pymammotion/proto ./pymammotion/proto/*.proto
      - name: Fail if generated code drifted from sources
        run: |
          if ! git diff --exit-code -- pymammotion/proto; then
            echo "::error::Generated proto code is out of sync with .proto sources."
            echo "Run: uv run protoc -I=. --python_out=. --python_betterproto2_out=pymammotion/proto ./pymammotion/proto/*.proto"
            echo "Then commit the result."
            exit 1
          fi
